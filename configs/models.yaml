# Omni-LLM Model Configuration
# Updated for v0.1.2
# YAML configuration for model definitions and routing rules

# Provider configurations
providers:
  litellm:
    type: litellm
    config:
      drop_params: true
      timeout: 30
      max_retries: 3
  
  mock:
    type: mock
    config:
      debug: false

# Model definitions
models:
  # OpenAI Models
  gpt-4o:
    provider: litellm
    model_id: openai/gpt-4o
    edit_format: editblock
    use_repo_map: true
    cost_per_million_input: 2.50
    cost_per_million_output: 10.00
    strengths: [architecture, complex_reasoning, code_review, multimodal]
    weaknesses: [cost]
    max_context_tokens: 128000

  gpt-4o-mini:
    provider: litellm
    model_id: openai/gpt-4o-mini
    edit_format: diff
    use_repo_map: false
    cost_per_million_input: 0.15
    cost_per_million_output: 0.60
    strengths: [speed, cost, simple_tasks, instruction_following]
    weaknesses: [complex_reasoning]
    max_context_tokens: 128000

  gpt-4.1:
    provider: litellm
    model_id: openai/gpt-4.1
    edit_format: editblock
    use_repo_map: true
    cost_per_million_input: 2.00
    cost_per_million_output: 8.00
    strengths: [coding, instruction_following, complex_reasoning]
    weaknesses: [cost]
    max_context_tokens: 128000

  gpt-4.1-mini:
    provider: litellm
    model_id: openai/gpt-4.1-mini
    edit_format: diff
    use_repo_map: false
    cost_per_million_input: 0.40
    cost_per_million_output: 1.60
    strengths: [speed, cost, coding]
    weaknesses: [complex_reasoning]
    max_context_tokens: 128000

  o3-mini:
    provider: litellm
    model_id: openai/o3-mini
    edit_format: editblock
    use_repo_map: true
    cost_per_million_input: 1.10
    cost_per_million_output: 4.40
    strengths: [reasoning, math, coding]
    weaknesses: [speed]
    max_context_tokens: 128000

  # Anthropic Models
  claude-sonnet-4:
    provider: litellm
    model_id: anthropic/claude-sonnet-4-20250514
    edit_format: editblock
    use_repo_map: true
    cost_per_million_input: 3.00
    cost_per_million_output: 15.00
    strengths: [complex_reasoning, coding, analysis, writing]
    weaknesses: [cost]
    max_context_tokens: 200000

  claude-haiku-3.5:
    provider: litellm
    model_id: anthropic/claude-haiku-3-5-20241022
    edit_format: diff
    use_repo_map: false
    cost_per_million_input: 0.80
    cost_per_million_output: 4.00
    strengths: [speed, cost, simple_tasks]
    weaknesses: [complex_reasoning]
    max_context_tokens: 200000

  # Google Models
  gemini-2.5-pro:
    provider: litellm
    model_id: google/gemini-2.5-pro-preview-03-25
    edit_format: editblock
    use_repo_map: true
    cost_per_million_input: 1.25
    cost_per_million_output: 10.00
    strengths: [multimodal, long_context, coding, reasoning]
    weaknesses: [tool_use]
    max_context_tokens: 1000000

  gemini-2.0-flash:
    provider: litellm
    model_id: google/gemini-2.0-flash
    edit_format: diff
    use_repo_map: false
    cost_per_million_input: 0.10
    cost_per_million_output: 0.40
    strengths: [speed, cost, simple_tasks]
    weaknesses: [complex_reasoning]
    max_context_tokens: 1000000
  
  # DeepSeek Models
  deepseek-chat:
    provider: litellm
    model_id: deepseek/deepseek-chat
    edit_format: whole
    use_repo_map: false
    cost_per_million_input: 0.28
    cost_per_million_output: 0.42
    strengths: [coding, cost, speed]
    weaknesses: [complex_reasoning, english]
    max_context_tokens: 64000
    
  deepseek-coder:
    provider: litellm
    model_id: deepseek/deepseek-coder
    edit_format: whole
    use_repo_map: false
    cost_per_million_input: 0.28
    cost_per_million_output: 0.42
    strengths: [coding, cost, speed]
    weaknesses: [general_reasoning]
    max_context_tokens: 64000
  
  # Mock Models (for testing)
  mock-gpt:
    provider: mock
    model_id: mock-gpt
    edit_format: editblock
    use_repo_map: false
    cost_per_million_input: 0.00
    cost_per_million_output: 0.00
    strengths: [testing, deterministic]
    weaknesses: [real_world_use]
    max_context_tokens: 1000

# Routing rules
routing:
  # Task type to model mapping
  task_types:
    architecture:
      priority: [claude-sonnet-4, gpt-4o, gemini-2.5-pro]
      min_quality: 0.8
      max_cost_per_task: 0.50

    coding:
      priority: [deepseek-chat, gpt-4o-mini, claude-haiku-3.5]
      min_quality: 0.7
      max_cost_per_task: 0.10

    code_review:
      priority: [gpt-4o, claude-sonnet-4, gemini-2.5-pro]
      min_quality: 0.9
      max_cost_per_task: 0.30

    testing:
      priority: [deepseek-coder, gpt-4o-mini, claude-haiku-3.5]
      min_quality: 0.6
      max_cost_per_task: 0.05

    documentation:
      priority: [claude-sonnet-4, gpt-4o, gemini-2.5-pro]
      min_quality: 0.8
      max_cost_per_task: 0.20
  
  # Default routing strategy
  default_strategy: cost_optimized  # cost_optimized, quality_first, balanced
  
  # Fallback chain (if primary model fails)
  fallback_chain:
    - gpt-4o
    - claude-sonnet-4
    - gemini-2.5-pro
    - gpt-4o-mini
    - deepseek-chat
  
  # Budget settings
  budget:
    daily_limit: 10.00  # USD per day
    per_session_limit: 2.00  # USD per session
    warning_threshold: 0.8  # Warn at 80% of limit

# Edit format configurations
edit_formats:
  editblock:
    enabled: true
    max_search_lines: 50
    require_exact_match: false
    
  diff:
    enabled: true
    context_lines: 3
    
  whole:
    enabled: true
    max_file_size_kb: 100
    
  patch:
    enabled: false  # Coming soon

# Verification pipeline
verification:
  enabled: true
  steps:
    - name: lint
      command: ruff check --fix
      languages: [python]
      required: false
      
    - name: test
      command: pytest
      languages: [python]
      required: false
      
    - name: type_check
      command: mypy
      languages: [python]
      required: false
      
    - name: security
      command: bandit -r .
      languages: [python]
      required: false

# Git configuration
git:
  auto_commit: true
  commit_message_template: "feat: {summary}"
  branch_template: "omni/{timestamp}-{task_type}"
  worktree_enabled: false  # Phase 2 feature
  attribution:
    author: "Omni-LLM <ai@omni-llm.dev>"
    committer: "{user_name} <{user_email}>"
    co_authors: ["AI Assistant <ai@omni-llm.dev>"]