# Omni-LLM Provider Configuration
# YAML configuration for provider definitions and API key management

# Provider configurations
providers:
  # LiteLLM Provider (default, supports many LLM APIs)
  litellm:
    type: litellm
    description: "LiteLLM adapter for multiple LLM providers"
    enabled: true
    config:
      drop_params: true
      timeout: 30
      max_retries: 3
      # API keys can be set via environment variables:
      # OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY, etc.
      # or directly here (not recommended for production)
      api_keys: {}
    
    # Model-specific configurations
    models:
      openai/gpt-4:
        max_tokens: 8192
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true
        
      openai/gpt-4-turbo-preview:
        max_tokens: 128000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true
        
      openai/gpt-3.5-turbo:
        max_tokens: 16385
        temperature_range: [0.0, 2.0]
        supports_functions: true
        
      anthropic/claude-3-opus-20240229:
        max_tokens: 200000
        temperature_range: [0.0, 1.0]
        supports_tools: true
        
      anthropic/claude-3-sonnet-20240229:
        max_tokens: 200000
        temperature_range: [0.0, 1.0]
        supports_tools: true
        
      anthropic/claude-3-haiku-20240307:
        max_tokens: 200000
        temperature_range: [0.0, 1.0]
        supports_tools: true
        
      google/gemini-1.5-pro-latest:
        max_tokens: 1000000
        temperature_range: [0.0, 2.0]
        supports_tools: true
        
      google/gemini-1.5-flash-latest:
        max_tokens: 1000000
        temperature_range: [0.0, 2.0]
        supports_tools: true
        
      deepseek/deepseek-chat:
        max_tokens: 64000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        
      deepseek/deepseek-coder:
        max_tokens: 64000
        temperature_range: [0.0, 2.0]
        supports_functions: true

  # Mock Provider (for testing)
  mock:
    type: mock
    description: "Mock provider for testing and development"
    enabled: true
    config:
      debug: false
      response_delay: 0.1  # seconds
      deterministic: true

  # Ollama Provider (local models)
  ollama:
    type: litellm
    description: "Ollama local models via LiteLLM"
    enabled: false  # Disabled by default, requires local Ollama installation
    config:
      base_url: "http://localhost:11434"
      timeout: 60
    models:
      ollama/llama2:
        max_tokens: 4096
        temperature_range: [0.0, 1.0]
      ollama/codellama:
        max_tokens: 4096
        temperature_range: [0.0, 1.0]
      ollama/mistral:
        max_tokens: 4096
        temperature_range: [0.0, 1.0]

# Default provider settings
defaults:
  provider: litellm
  model: gpt-4
  temperature: 0.7
  max_tokens: 1000
  timeout: 30

# API Key Management
# Environment variables take precedence over config file
api_keys:
  # OpenAI
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  
  # Anthropic
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  
  # Google
  GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
  
  # DeepSeek
  DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
  
  # Cohere
  COHERE_API_KEY: "${COHERE_API_KEY}"
  
  # Mistral
  MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
  
  # Ollama (no API key needed for local)

# Provider-specific configurations
provider_configs:
  # OpenAI-specific settings
  openai:
    base_url: "https://api.openai.com/v1"
    organization: "${OPENAI_ORGANIZATION}"
    
  # Anthropic-specific settings
  anthropic:
    base_url: "https://api.anthropic.com"
    version: "2023-06-01"
    
  # Google-specific settings
  google:
    base_url: "https://generativelanguage.googleapis.com"
    
  # DeepSeek-specific settings
  deepseek:
    base_url: "https://api.deepseek.com"

# Model-specific cost configurations
cost_config:
  # Cost per million tokens (USD)
  # These are used for budget tracking and cost optimization
  rates:
    openai/gpt-4:
      input: 30.00
      output: 60.00
      
    openai/gpt-4-turbo-preview:
      input: 10.00
      output: 30.00
      
    openai/gpt-3.5-turbo:
      input: 0.50
      output: 1.50
      
    anthropic/claude-3-opus-20240229:
      input: 15.00
      output: 75.00
      
    anthropic/claude-3-sonnet-20240229:
      input: 3.00
      output: 15.00
      
    anthropic/claude-3-haiku-20240307:
      input: 0.25
      output: 1.25
      
    google/gemini-1.5-pro-latest:
      input: 3.50
      output: 10.50
      
    google/gemini-1.5-flash-latest:
      input: 0.075
      output: 0.30
      
    deepseek/deepseek-chat:
      input: 0.28
      output: 0.42
      
    deepseek/deepseek-coder:
      input: 0.28
      output: 0.42
      
    ollama/llama2:
      input: 0.00
      output: 0.00
      
    ollama/codellama:
      input: 0.00
      output: 0.00
      
    ollama/mistral:
      input: 0.00
      output: 0.00

# Budget and rate limiting
budget:
  daily_limit: 10.00  # USD per day
  per_session_limit: 2.00  # USD per session
  warning_threshold: 0.8  # Warn at 80% of limit
  hard_limit: true  # Stop when limit reached

rate_limiting:
  enabled: true
  requests_per_minute: 60
  tokens_per_minute: 150000
  burst_capacity: 10