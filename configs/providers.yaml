# Omni-LLM Provider Configuration
# YAML configuration for provider definitions and API key management

# Provider configurations
providers:
  # LiteLLM Provider (default, supports many LLM APIs)
  litellm:
    type: litellm
    description: "LiteLLM adapter for multiple LLM providers"
    enabled: true
    config:
      drop_params: true
      timeout: 30
      max_retries: 3
      # API keys can be set via environment variables:
      # OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY, etc.
      # or directly here (not recommended for production)
      api_keys: {}
    
    # Model-specific configurations
    models:
      openai/gpt-4o:
        max_tokens: 128000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true

      openai/gpt-4o-mini:
        max_tokens: 128000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true

      openai/gpt-4.1:
        max_tokens: 128000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true

      openai/gpt-4.1-mini:
        max_tokens: 128000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true

      openai/o3-mini:
        max_tokens: 128000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        supports_tools: true

      anthropic/claude-sonnet-4-20250514:
        max_tokens: 200000
        temperature_range: [0.0, 1.0]
        supports_tools: true

      anthropic/claude-haiku-3-5-20241022:
        max_tokens: 200000
        temperature_range: [0.0, 1.0]
        supports_tools: true

      google/gemini-2.5-pro-preview-03-25:
        max_tokens: 1000000
        temperature_range: [0.0, 2.0]
        supports_tools: true

      google/gemini-2.0-flash:
        max_tokens: 1000000
        temperature_range: [0.0, 2.0]
        supports_tools: true
        
      deepseek/deepseek-chat:
        max_tokens: 64000
        temperature_range: [0.0, 2.0]
        supports_functions: true
        
      deepseek/deepseek-coder:
        max_tokens: 64000
        temperature_range: [0.0, 2.0]
        supports_functions: true

  # Mock Provider (for testing)
  mock:
    type: mock
    description: "Mock provider for testing and development"
    enabled: true
    config:
      debug: false
      response_delay: 0.1  # seconds
      deterministic: true

  # Ollama Provider (local models)
  ollama:
    type: litellm
    description: "Ollama local models via LiteLLM"
    enabled: true  # Requires local Ollama installation (https://ollama.com)
    config:
      base_url: "http://localhost:11434"
      timeout: 60
    models:
      ollama/llama3:
        max_tokens: 8192
        temperature_range: [0.0, 1.0]
      ollama/qwen3.5:
        max_tokens: 32768
        temperature_range: [0.0, 1.0]
      ollama/codellama:
        max_tokens: 4096
        temperature_range: [0.0, 1.0]

# Default provider settings
defaults:
  provider: litellm
  model: openai/gpt-4o
  temperature: 0.7
  max_tokens: 1000
  timeout: 30

# API Key Management
# Environment variables take precedence over config file
api_keys:
  # OpenAI
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  
  # Anthropic
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  
  # Google
  GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
  
  # DeepSeek
  DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
  
  # Cohere
  COHERE_API_KEY: "${COHERE_API_KEY}"
  
  # Mistral
  MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
  
  # Ollama (no API key needed for local)

# Provider-specific configurations
provider_configs:
  # OpenAI-specific settings
  openai:
    base_url: "https://api.openai.com/v1"
    organization: "${OPENAI_ORGANIZATION}"
    
  # Anthropic-specific settings
  anthropic:
    base_url: "https://api.anthropic.com"
    version: "2023-06-01"
    
  # Google-specific settings
  google:
    base_url: "https://generativelanguage.googleapis.com"
    
  # DeepSeek-specific settings
  deepseek:
    base_url: "https://api.deepseek.com"

# Model-specific cost configurations
cost_config:
  # Cost per million tokens (USD)
  # These are used for budget tracking and cost optimization
  rates:
    openai/gpt-4o:
      input: 2.50
      output: 10.00

    openai/gpt-4o-mini:
      input: 0.15
      output: 0.60

    openai/gpt-4.1:
      input: 2.00
      output: 8.00

    openai/gpt-4.1-mini:
      input: 0.40
      output: 1.60

    openai/o3-mini:
      input: 1.10
      output: 4.40

    anthropic/claude-sonnet-4-20250514:
      input: 3.00
      output: 15.00

    anthropic/claude-haiku-3-5-20241022:
      input: 0.80
      output: 4.00

    google/gemini-2.5-pro-preview-03-25:
      input: 1.25
      output: 10.00

    google/gemini-2.0-flash:
      input: 0.10
      output: 0.40
      
    deepseek/deepseek-chat:
      input: 0.28
      output: 0.42
      
    deepseek/deepseek-coder:
      input: 0.28
      output: 0.42
      
    ollama/llama3:
      input: 0.00
      output: 0.00

    ollama/qwen3.5:
      input: 0.00
      output: 0.00

    ollama/codellama:
      input: 0.00
      output: 0.00

# Budget and rate limiting
budget:
  daily_limit: 10.00  # USD per day
  per_session_limit: 2.00  # USD per session
  warning_threshold: 0.8  # Warn at 80% of limit
  hard_limit: true  # Stop when limit reached

rate_limiting:
  enabled: true
  requests_per_minute: 60
  tokens_per_minute: 150000
  burst_capacity: 10